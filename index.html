<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Träffa — Ny omröstning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --ink: #1a1612;
    --muted: #7a736a;
    --accent: #c9462a;
    --accent-light: #f5e8e4;
    --border: #ddd8ce;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 48px 16px 80px;
  }
  .wrap { max-width: 620px; margin: 0 auto; }

  header { margin-bottom: 48px; }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span { font-style: italic; }
  .tagline { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    font-weight: 400;
    margin-bottom: 20px;
    color: var(--ink);
  }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type=text], textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus, textarea:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 72px; }
  .field { margin-bottom: 20px; }

  .dates-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .dates-header h2 { margin-bottom: 0; }
  .add-btn {
    background: none;
    border: 1.5px dashed var(--accent);
    color: var(--accent);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
  }
  .add-btn:hover { background: var(--accent-light); }
  .add-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .date-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr auto;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
    animation: fadeIn 0.2s ease;
  }
  .date-row .sep {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    padding: 0 2px;
  }
  .remove-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.1rem;
    padding: 4px 6px;
    border-radius: 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .remove-btn:hover { color: var(--accent); }

  input[type=date] {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    outline: none;
    width: 100%;
    transition: border-color 0.15s;
  }
  input[type=date]:focus { border-color: var(--accent); }

  .hint { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 16px;
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .result-card {
    background: var(--surface);
    border: 1.5px solid var(--accent);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-top: 24px;
    display: none;
  }
  .result-card h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    font-weight: 400;
    margin-bottom: 14px;
  }
  .result-link {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .result-link input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 0.88rem;
    color: var(--muted);
    font-family: monospace;
    outline: none;
  }
  .copy-btn {
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 0.85rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .copy-btn:hover { opacity: 0.8; }
  .result-note { font-size: 0.82rem; color: var(--muted); margin-top: 12px; }

  .error { color: var(--accent); font-size: 0.85rem; margin-top: 10px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Träff<span>a</span></div>
    <div class="tagline">Enkel mötesbokning utan krångel</div>
  </header>

  <div class="card">
    <h2>Om omröstningen</h2>
    <div class="field">
      <label>Titel</label>
      <input type="text" id="title" placeholder="T.ex. Kickoff Q3" maxlength="100">
    </div>
    <div class="field">
      <label>Beskrivning <span style="font-weight:300;text-transform:none;letter-spacing:0">(valfri)</span></label>
      <textarea id="desc" placeholder="Mer info om mötet..."></textarea>
    </div>
  </div>

  <div class="card">
    <div class="dates-header">
      <h2>Tillfällen</h2>
      <button class="add-btn" id="addBtn" onclick="addRow()">+ Lägg till</button>
    </div>
    <p class="hint" style="margin-bottom:14px">Ange ett datum eller ett intervall (från–till). Max 10 tillfällen.</p>
    <div id="dateRows"></div>
  </div>

  <button class="submit-btn" onclick="createPoll()">Skapa omröstning →</button>
  <div class="error" id="err"></div>

  <div class="result-card" id="resultCard">
    <h3>✓ Omröstning skapad!</h3>
    <p style="font-size:0.88rem;color:var(--muted);margin-bottom:14px">Dela länken med deltagarna:</p>
    <div class="result-link">
      <input type="text" id="resultLink" readonly>
      <button class="copy-btn" onclick="copyLink()">Kopiera</button>
    </div>
    <p class="result-note">Deltagarna anger sitt namn och röstar direkt via länken. Du ser resultatet på samma sida.</p>
  </div>
</div>

<script>
const WORKER = "https://traffa.johan-oestberg.workers.dev"; // ← byt ut

let rowCount = 0;

function getLastDate() {
  const rows = document.querySelectorAll(".date-row");
  if (!rows.length) return "";
  const last = rows[rows.length - 1];
  const to = last.querySelector("input:nth-of-type(2)").value;
  const from = last.querySelector("input:nth-of-type(1)").value;
  return to || from || "";
}

function addRow() {
  if (rowCount >= 10) return;
  rowCount++;
  const id = `row${rowCount}`;
  const prefill = getLastDate();
  const div = document.createElement("div");
  div.className = "date-row";
  div.id = id;
  div.innerHTML = `
    <input type="date" id="${id}_from" value="${prefill}">
    <span class="sep">–</span>
    <input type="date" id="${id}_to">
    <button class="remove-btn" onclick="removeRow('${id}')">✕</button>
  `;
  document.getElementById("dateRows").appendChild(div);
  document.getElementById("addBtn").disabled = rowCount >= 10;

  const fromInput = document.getElementById(`${id}_from`);
  const toInput = document.getElementById(`${id}_to`);

  // När from ändras: sätt to till samma värde så datumväljaren öppnar rätt månad
  fromInput.addEventListener("change", () => {
    if (fromInput.value && !toInput.value) {
      toInput.value = fromInput.value;
    }
    if (toInput.value && toInput.value < fromInput.value) {
      toInput.value = fromInput.value;
    }
    toInput.min = fromInput.value;
  });

  fromInput.focus();
}

function removeRow(id) {
  document.getElementById(id)?.remove();
  rowCount--;
  document.getElementById("addBtn").disabled = false;
}

function getDates() {
  const rows = document.querySelectorAll(".date-row");
  const dates = [];
  for (const row of rows) {
    const from = row.querySelector("input:nth-of-type(1)").value;
    const to = row.querySelector("input:nth-of-type(2)").value;
    if (!from) continue;
    dates.push(to && to !== from ? { from, to } : { from });
  }
  return dates;
}

async function createPoll() {
  const title = document.getElementById("title").value.trim();
  const description = document.getElementById("desc").value.trim();
  const dates = getDates();
  const err = document.getElementById("err");
  err.textContent = "";

  if (!title) { err.textContent = "Ange en titel."; return; }
  if (!dates.length) { err.textContent = "Lägg till minst ett tillfälle."; return; }

  const btn = document.querySelector(".submit-btn");
  btn.disabled = true;
  btn.textContent = "Skapar…";

  try {
    const res = await fetch(`${WORKER}/poll`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, description, dates }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Något gick fel");
    const link = `${location.origin}/traffa/vote.html?id=${data.id}`;
    document.getElementById("resultLink").value = link;
    document.getElementById("resultCard").style.display = "block";
    document.getElementById("resultCard").scrollIntoView({ behavior: "smooth" });
  } catch (e) {
    err.textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = "Skapa omröstning →";
  }
}

function copyLink() {
  const val = document.getElementById("resultLink").value;
  navigator.clipboard.writeText(val);
  const btn = document.querySelector(".copy-btn");
  btn.textContent = "Kopierat!";
  setTimeout(() => btn.textContent = "Kopiera", 2000);
}

// Starta med en rad
addRow();
</script>
</body>
</html>
