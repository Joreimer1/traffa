<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Träffa — Rösta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --ink: #1a1612;
    --muted: #7a736a;
    --accent: #c9462a;
    --accent-light: #f5e8e4;
    --border: #ddd8ce;
    --green: #2a7a4a;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 48px 16px 80px;
  }
  .wrap { max-width: 620px; margin: 0 auto; }

  header { margin-bottom: 40px; }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--accent);
    letter-spacing: -0.5px;
    text-decoration: none;
    display: inline-block;
  }
  .logo span { font-style: italic; }

  .poll-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    margin-bottom: 6px;
    line-height: 1.2;
  }
  .poll-desc { color: var(--muted); font-size: 0.9rem; margin-top: 8px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    font-weight: 400;
    margin-bottom: 18px;
  }

  .name-row input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .name-row input:focus { border-color: var(--accent); }

  .date-check-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 0;
    border-top: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .check-box {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-radius: 5px;
    background: var(--bg);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-size: 14px;
    color: #fff;
  }
  .date-check-row.checked .check-box {
    background: var(--green);
    border-color: var(--green);
  }
  .date-check-row:hover .check-box { border-color: var(--green); }
  .check-label { font-size: 0.92rem; }

  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 15px;
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.3px;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .error { color: var(--accent); font-size: 0.85rem; margin-top: 10px; }
  .success-msg { color: var(--green); font-size: 0.88rem; margin-bottom: 20px; font-weight: 500; }

  .results-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-top: 24px;
  }
  .results-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    font-weight: 400;
    margin-bottom: 20px;
  }
  .result-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-top: 1px solid var(--border);
    gap: 12px;
  }
  .result-date { flex: 1; font-size: 0.9rem; }
  .result-score {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    min-width: 36px;
    text-align: right;
    color: var(--accent);
  }
  .score-bar-wrap {
    width: 120px; height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .score-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .voters-section { margin-top: 24px; }
  .voters-section h3 {
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .voter-row {
    font-size: 0.85rem;
    padding: 7px 0;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .voter-name { font-weight: 400; min-width: 120px; }
  .voter-dates { display: flex; gap: 5px; flex-wrap: wrap; }
  .date-tag {
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--green);
    color: #fff;
  }

  .loading { color: var(--muted); font-size: 0.9rem; padding: 40px 0; text-align: center; }
  .not-found { color: var(--accent); text-align: center; padding: 60px 0; }

  @media (max-width: 480px) {
    .card, .results-card { padding: 20px 18px; }
    .score-bar-wrap { width: 60px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a href="https://joreimer1.github.io/traffa/" class="logo">Träff<span>a</span></a>
  </header>
  <div id="app"><div class="loading">Laddar omröstning…</div></div>
</div>

<script>
const WORKER = "https://traffa.johan-oestberg.workers.dev";

const params = new URLSearchParams(location.search);
const pollId = params.get("id");

let poll = null;
let votes = [];
let checked = {};
let hasVoted = false;
let myName = "";

function formatDate(d) {
  const [y, m, day] = d.split("-");
  const months = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

function formatDateEntry(e) {
  return e.to ? `${formatDate(e.from)} – ${formatDate(e.to)}` : formatDate(e.from);
}

function scoreOf(votes, idx) {
  return votes.filter(v => v.choices[idx] === 1).length;
}

function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function toggleCheck(idx) {
  checked[idx] = !checked[idx];
  render();
}

function render() {
  const app = document.getElementById("app");
  if (!poll) { app.innerHTML = '<div class="not-found">Omröstningen hittades inte.</div>'; return; }

  const scores = poll.dates.map((_, i) => scoreOf(votes, i));
  const maxScore = Math.max(...scores, 1);
  const alreadyVoted = myName && votes.some(v => v.voter_name.toLowerCase() === myName.toLowerCase());

  app.innerHTML = `
    <div style="margin-bottom:32px">
      <div class="poll-title">${esc(poll.title)}</div>
      ${poll.description ? `<div class="poll-desc">${esc(poll.description)}</div>` : ""}
    </div>

    ${!hasVoted ? `
    <div class="card">
      <h2>Ditt namn</h2>
      <div class="name-row">
        <input type="text" id="voterName" placeholder="Förnamn Efternamn" value="${esc(myName)}" oninput="myName=this.value" maxlength="60">
      </div>
    </div>

    <div class="card">
      <h2>Vilka datum passar dig?</h2>
      ${poll.dates.map((d, i) => `
      <div class="date-check-row ${checked[i] ? 'checked' : ''}" onclick="toggleCheck(${i})">
        <div class="check-box">${checked[i] ? '✓' : ''}</div>
        <span class="check-label">${formatDateEntry(d)}</span>
      </div>`).join("")}
      ${alreadyVoted ? `<div class="error" style="margin-top:14px">Du har redan svarat som "${esc(myName)}".</div>` : ""}
    </div>

    <button class="submit-btn" onclick="submitVote()">Skicka svar →</button>
    <div id="voteMsg"></div>
    ` : `<div class="success-msg">✓ Ditt svar är registrerat!</div>`}

    <div class="results-card">
      <h2>Resultat ${votes.length > 0 ? `(${votes.length} ${votes.length===1?"svar":"svar"})` : ""}</h2>
      ${votes.length === 0 ? `<div style="color:var(--muted);font-size:0.88rem">Inga svar ännu.</div>` : ""}
      ${poll.dates.map((d, i) => `
      <div class="result-row">
        <div class="result-date">${formatDateEntry(d)}</div>
        <div class="score-bar-wrap"><div class="score-bar" style="width:${Math.round(scores[i]/maxScore*100)}%"></div></div>
        <div class="result-score">${scores[i]}</div>
      </div>`).join("")}

      ${votes.length > 0 ? `
      <div class="voters-section">
        <h3>Svar</h3>
        ${votes.map(v => {
          const okDates = poll.dates.filter((_, i) => v.choices[i] === 1);
          return `<div class="voter-row">
            <span class="voter-name">${esc(v.voter_name)}</span>
            <div class="voter-dates">
              ${okDates.length === 0
                ? `<span style="color:var(--muted);font-size:0.78rem">Inga datum passar</span>`
                : okDates.map(d => `<span class="date-tag">${formatDateEntry(d)}</span>`).join("")}
            </div>
          </div>`;
        }).join("")}
      </div>` : ""}
    </div>
  `;
}

async function submitVote() {
  const name = (document.getElementById("voterName")?.value || "").trim();
  const msg = document.getElementById("voteMsg");
  if (!name) { msg.className = "error"; msg.textContent = "Ange ditt namn."; return; }

  const choicesOut = {};
  for (let i = 0; i < poll.dates.length; i++) {
    if (checked[i]) choicesOut[i] = 1;
  }

  const btn = document.querySelector(".submit-btn");
  btn.disabled = true;
  btn.textContent = "Skickar…";

  try {
    const res = await fetch(`${WORKER}/vote`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ poll_id: pollId, voter_name: name, choices: choicesOut }),
    });
    const data = await res.json();
    if (res.status === 409) { msg.className = "error"; msg.textContent = "Du har redan svarat med det namnet."; btn.disabled=false; btn.textContent="Skicka svar →"; return; }
    if (!res.ok) throw new Error(data.error || "Något gick fel");
    hasVoted = true;
    myName = name;
    await loadPoll();
  } catch (e) {
    msg.className = "error";
    msg.textContent = e.message;
    btn.disabled = false;
    btn.textContent = "Skicka svar →";
  }
}

async function loadPoll() {
  if (!pollId) { poll = null; render(); return; }
  try {
    const res = await fetch(`${WORKER}/poll/${pollId}`);
    if (!res.ok) { poll = null; render(); return; }
    const data = await res.json();
    poll = data.poll;
    votes = data.votes;
    render();
    setTimeout(loadPoll, 30000);
  } catch {
    poll = null;
    render();
  }
}

loadPoll();
</script>
</body>
</html>
