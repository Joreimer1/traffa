<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Träffa — Rösta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #fffdf8;
    --ink: #1a1612;
    --muted: #7a736a;
    --accent: #c9462a;
    --accent-light: #f5e8e4;
    --border: #ddd8ce;
    --gold: #b8860b;
    --silver: #6e7f8a;
    --bronze: #8b5e3c;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 48px 16px 80px;
  }
  .wrap { max-width: 660px; margin: 0 auto; }

  header { margin-bottom: 40px; }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    color: var(--accent);
    letter-spacing: -0.5px;
    text-decoration: none;
    display: inline-block;
  }
  .logo span { font-style: italic; }

  .poll-title {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    font-weight: 400;
    margin-bottom: 6px;
    line-height: 1.2;
  }
  .poll-desc { color: var(--muted); font-size: 0.9rem; margin-top: 8px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    font-weight: 400;
    margin-bottom: 18px;
  }

  /* Namn */
  .name-row { display: flex; gap: 10px; align-items: flex-end; }
  .name-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .name-row input:focus { border-color: var(--accent); }

  /* Röstningstabell */
  .vote-table { width: 100%; border-collapse: collapse; }
  .vote-table th {
    font-size: 0.75rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 8px 12px;
    text-align: center;
  }
  .vote-table th.date-th { text-align: left; padding-left: 0; }
  .vote-table td { padding: 8px; border-top: 1px solid var(--border); vertical-align: middle; }
  .vote-table td.date-cell { font-size: 0.92rem; padding-left: 0; }
  .date-label { font-weight: 400; }
  .date-range { font-size: 0.78rem; color: var(--muted); }

  .rank-cell { text-align: center; }
  .rank-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .rank-btn:hover { border-color: var(--accent); color: var(--accent); }
  .rank-btn.selected-1 { background: var(--gold); border-color: var(--gold); color: #fff; }
  .rank-btn.selected-2 { background: var(--silver); border-color: var(--silver); color: #fff; }
  .rank-btn.selected-3 { background: var(--bronze); border-color: var(--bronze); color: #fff; }

  .legend {
    display: flex; gap: 16px;
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .legend-dot {
    width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: middle;
  }

  .submit-btn {
    width: 100%;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 15px;
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    cursor: pointer;
    transition: opacity 0.15s;
    letter-spacing: 0.3px;
  }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .error { color: var(--accent); font-size: 0.85rem; margin-top: 10px; }
  .success { color: #2a7a4a; font-size: 0.88rem; margin-top: 10px; font-weight: 500; }

  /* Resultat */
  .results-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 32px;
    margin-top: 24px;
  }
  .results-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.2rem;
    font-weight: 400;
    margin-bottom: 20px;
  }

  .result-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-top: 1px solid var(--border);
    gap: 12px;
  }
  .result-date { flex: 1; font-size: 0.9rem; }
  .result-score {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    min-width: 40px;
    text-align: right;
    color: var(--accent);
  }
  .score-bar-wrap {
    width: 120px;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .score-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .voters-section { margin-top: 24px; }
  .voters-section h3 {
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .voter-row { font-size: 0.85rem; padding: 6px 0; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .voter-name { font-weight: 400; min-width: 120px; }
  .voter-choices { display: flex; gap: 6px; flex-wrap: wrap; }
  .choice-tag {
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 99px;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .choice-tag.r1 { background: var(--gold); color: #fff; border-color: var(--gold); }
  .choice-tag.r2 { background: var(--silver); color: #fff; border-color: var(--silver); }
  .choice-tag.r3 { background: var(--bronze); color: #fff; border-color: var(--bronze); }

  .loading { color: var(--muted); font-size: 0.9rem; padding: 40px 0; text-align: center; }
  .not-found { color: var(--accent); text-align: center; padding: 60px 0; font-size: 1rem; }

  @media (max-width: 480px) {
    .card, .results-card { padding: 20px 18px; }
    .score-bar-wrap { width: 60px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a href="index.html" class="logo">Träff<span>a</span></a>
  </header>

  <div id="app"><div class="loading">Laddar omröstning…</div></div>
</div>

<script>
const WORKER = "https://traffa.johan-oestberg.workers.dev"; // ← byt ut

const params = new URLSearchParams(location.search);
const pollId = params.get("id");

let poll = null;
let votes = [];
let choices = {}; // dateIndex -> rank (1/2/3)
let hasVoted = false;
let myName = "";

function formatDate(d) {
  const [y, m, day] = d.split("-");
  const months = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

function formatDateEntry(entry) {
  if (entry.to) return `${formatDate(entry.from)} – ${formatDate(entry.to)}`;
  return formatDate(entry.from);
}

function scoreOf(votes, idx) {
  // 1:a val = 3p, 2:a val = 2p, 3:e val = 1p
  let score = 0;
  for (const v of votes) {
    const rank = v.choices[idx];
    if (rank === 1) score += 3;
    else if (rank === 2) score += 2;
    else if (rank === 3) score += 1;
  }
  return score;
}

function render() {
  const app = document.getElementById("app");

  if (!poll) { app.innerHTML = '<div class="not-found">Omröstningen hittades inte.</div>'; return; }

  const scores = poll.dates.map((_, i) => scoreOf(votes, i));
  const maxScore = Math.max(...scores, 1);

  // Kolla om nuvarande namn redan röstat
  const alreadyVoted = myName && votes.some(v => v.voter_name.toLowerCase() === myName.toLowerCase());

  app.innerHTML = `
    <div style="margin-bottom:32px">
      <div class="poll-title">${esc(poll.title)}</div>
      ${poll.description ? `<div class="poll-desc">${esc(poll.description)}</div>` : ""}
    </div>

    ${!hasVoted ? `
    <div class="card">
      <h2>Ditt namn</h2>
      <div class="name-row">
        <input type="text" id="voterName" placeholder="Förnamn Efternamn" value="${esc(myName)}" oninput="myName=this.value" maxlength="60">
      </div>
    </div>

    <div class="card">
      <h2>Dina val</h2>
      <div class="legend">
        <span><span class="legend-dot" style="background:var(--gold)"></span>1:a val (3p)</span>
        <span><span class="legend-dot" style="background:var(--silver)"></span>2:a val (2p)</span>
        <span><span class="legend-dot" style="background:var(--bronze)"></span>3:e val (1p)</span>
      </div>
      <table class="vote-table">
        <thead>
          <tr>
            <th class="date-th">Tillfälle</th>
            <th>1:a</th><th>2:a</th><th>3:e</th>
          </tr>
        </thead>
        <tbody>
          ${poll.dates.map((d, i) => `
          <tr>
            <td class="date-cell"><span class="date-label">${formatDateEntry(d)}</span></td>
            ${[1,2,3].map(r => `
            <td class="rank-cell">
              <button class="rank-btn ${choices[i]===r ? `selected-${r}` : ''}"
                onclick="toggleChoice(${i},${r})">${r}</button>
            </td>`).join("")}
          </tr>`).join("")}
        </tbody>
      </table>
      ${alreadyVoted ? `<div class="error" style="margin-top:14px">Du har redan röstat som "${esc(myName)}".</div>` : ""}
    </div>

    <button class="submit-btn" onclick="submitVote()">Skicka min röst →</button>
    <div id="voteMsg"></div>
    ` : `<div class="success" style="margin-bottom:20px">✓ Din röst är registrerad!</div>`}

    <div class="results-card">
      <h2>Resultat ${votes.length > 0 ? `(${votes.length} ${votes.length===1?"röst":"röster"})` : ""}</h2>
      ${votes.length === 0 ? `<div style="color:var(--muted);font-size:0.88rem">Inga röster ännu.</div>` : ""}
      ${poll.dates.map((d, i) => `
      <div class="result-row">
        <div class="result-date">${formatDateEntry(d)}</div>
        <div class="score-bar-wrap"><div class="score-bar" style="width:${Math.round(scores[i]/maxScore*100)}%"></div></div>
        <div class="result-score">${scores[i]}p</div>
      </div>`).join("")}

      ${votes.length > 0 ? `
      <div class="voters-section">
        <h3>Röster</h3>
        ${votes.map(v => `
        <div class="voter-row">
          <span class="voter-name">${esc(v.voter_name)}</span>
          <div class="voter-choices">
            ${poll.dates.map((d, i) => {
              const r = v.choices[i];
              if (!r) return "";
              return `<span class="choice-tag r${r}">${formatDateEntry(d)}: ${r}:a</span>`;
            }).join("")}
          </div>
        </div>`).join("")}
      </div>` : ""}
    </div>
  `;
}

function esc(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function toggleChoice(idx, rank) {
  if (choices[idx] === rank) {
    delete choices[idx];
  } else {
    // Om rang redan används på annan rad, ta bort den
    for (const k in choices) {
      if (choices[k] === rank) delete choices[k];
    }
    choices[idx] = rank;
  }
  render();
}

async function submitVote() {
  const name = (document.getElementById("voterName")?.value || "").trim();
  const msg = document.getElementById("voteMsg");
  if (!name) { msg.className = "error"; msg.textContent = "Ange ditt namn."; return; }
  if (Object.keys(choices).length === 0) { msg.className = "error"; msg.textContent = "Välj minst ett tillfälle."; return; }

  const btn = document.querySelector(".submit-btn");
  btn.disabled = true;
  btn.textContent = "Skickar…";

  try {
    const res = await fetch(`${WORKER}/vote`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ poll_id: pollId, voter_name: name, choices }),
    });
    const data = await res.json();
    if (res.status === 409) { msg.className = "error"; msg.textContent = "Du har redan röstat med det namnet."; btn.disabled=false; btn.textContent="Skicka min röst →"; return; }
    if (!res.ok) throw new Error(data.error || "Något gick fel");
    hasVoted = true;
    myName = name;
    await loadPoll();
  } catch (e) {
    msg.className = "error";
    msg.textContent = e.message;
    btn.disabled = false;
    btn.textContent = "Skicka min röst →";
  }
}

async function loadPoll() {
  if (!pollId) { poll = null; render(); return; }
  try {
    const res = await fetch(`${WORKER}/poll/${pollId}`);
    if (!res.ok) { poll = null; render(); return; }
    const data = await res.json();
    poll = data.poll;
    votes = data.votes;
    render();
    // Uppdatera var 30s
    setTimeout(loadPoll, 30000);
  } catch {
    poll = null;
    render();
  }
}

loadPoll();
</script>
</body>
</html>
